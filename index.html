<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Struktur Organisasi Puskesmas Geyer 2</title>

<script src="https://balkan.app/js/OrgChart.js"></script>

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  background: #f1f8f4;
}

/* HEADER */
.header {
  text-align: center;
  margin-bottom: 15px;
}

.logo {
  width: 90px;
  margin-bottom: 8px;
}

h2 {
  color: #1b5e20;
  margin: 5px 0;
}

.subtitle {
  font-size: 14px;
  color: #2e7d32;
  font-weight: 500;
}

/* CONTAINER */
#tree {
  width: 100%;
  height: 750px;
  background: white;
  border-radius: 12px;
  border: 2px solid #c8e6c9;
  box-shadow: 0 3px 10px rgba(0,0,0,0.08);
}

</style>
</head>

<body>

<div class="header">
  <img class="logo" src="https://i.ibb.co/JRyb583c/Logo-Puskemas-Geyer-2.png">
  <h2>Struktur Organisasi Puskesmas Geyer 2</h2>
  <div class="subtitle">Berdasarkan SK Nomor: SK / 162 / I / 2024</div>
</div>

<div id="tree"></div>

<script>

OrgChart.templates.green = Object.assign({}, OrgChart.templates.ana);

// ukuran lebih lebar & tinggi
OrgChart.templates.green.size = [320, 110];

// box utama
OrgChart.templates.green.node = `
  <rect x="0" y="0" width="320" height="110" rx="12" ry="12"
  fill="#2e7d32" stroke="#0b3d1f" stroke-width="4"></rect>
`;

// foto
OrgChart.templates.green.img_0 = `
  <clipPath id="{randId}">
    <circle cx="60" cy="55" r="35"></circle>
  </clipPath>
  <image x="20" y="20" width="70" height="70"
  preserveAspectRatio="xMidYMid slice"
  clip-path="url(#{randId})"
  xlink:href="{val}"></image>
`;

// jabatan
OrgChart.templates.green.field_0 = `
  <text x="190" y="45" text-anchor="middle"
  style="font-size:15px;fill:#ffffff;font-weight:700;">
  {val}
  </text>
`;

// nama
OrgChart.templates.green.field_1 = `
  <text x="190" y="75" text-anchor="middle"
  style="font-size:13px;fill:#f1f8e9;font-weight:600;">
  {val}
  </text>
`;
  
// INIT CHART
var chart = new OrgChart(document.getElementById("tree"), {
    template: "green",
    enableSearch: true,
    mouseScrool: OrgChart.action.zoom,

    nodeBinding: {
        field_0: "name",
        field_1: "title",
        img_0: "img"
    },

    nodes: [

        { id: 21, pid: 20, name: "Koordinator Ibu Hamil", title: "Ririn Widiyanti", img: "https://i.pravatar.cc/150?img=10" },
