<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Struktur Organisasi Puskesmas Geyer 2</title>

<script src="https://balkan.app/js/OrgChart.js"></script>

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  background: #f1f8f4;
}

/* HEADER */
.header {
  text-align: center;
  margin-bottom: 15px;
}

.logo {
  width: 90px;
  margin-bottom: 8px;
}

h2 {
  color: #1b5e20;
  margin: 5px 0;
}

.subtitle {
  font-size: 14px;
  color: #2e7d32;
  font-weight: 500;
}

/* CONTAINER */
#tree {
  width: 100%;
  height: 750px;
  background: white;
  border-radius: 12px;
  border: 2px solid #c8e6c9;
  box-shadow: 0 3px 10px rgba(0,0,0,0.08);
}

/* ===== POPUP DETAIL (FIXED) ===== */

/* HEADER (bagian biru atas) */
.boc-card .boc-header,
.boc-header {
  background: #2e7d32 !important;
  color: white !important;
}

/* Avatar lingkaran */
.boc-card .boc-avatar,
.boc-avatar {
  border: 4px solid #2e7d32 !important;
}

/* Tombol bulat */
.boc-card .boc-button,
.boc-button {
  background: #2e7d32 !important;
  color: white !important;
}

/* Hover tombol */
.boc-button:hover {
  background: #1b5e20 !important;
}

/* Background isi */
.boc-card,
.boc-body {
  background: #f1f8f4 !important;
}

/* Label kecil (name/title/img) */
.boc-card .boc-label {
  color: #1b5e20 !important;
  font-weight: 600;
}

/* Value */
.boc-card .boc-value {
  color: #333 !important;
}

/* SHADOW biar lebih halus */
.boc-card {
  box-shadow: 0 6px 20px rgba(0,0,0,0.15) !important;
  border-radius: 12px !important;
}

/* ===== FIX PAKSA WARNA POPUP ===== */

/* Header biru → hijau */
div[style*="background-color: rgb(33, 150, 243)"] {
  background-color: #2e7d32 !important;
}

/* Tombol biru */
button, .boc-button, .boc-btn {
  background-color: #2e7d32 !important;
  color: white !important;
}

/* Hover */
button:hover {
  background-color: #1b5e20 !important;
}

/* Avatar border */
img[style*="border-radius"] {
  border: 4px solid #2e7d32 !important;
}
</style>
</head>

<body>

<div class="header">
  <img class="logo" src="logo.png">
  <h2>Struktur Organisasi Puskesmas Geyer 2</h2>
  <div class="subtitle">Berdasarkan SK Nomor: SK / 162 / I / 2024</div>
</div>

<div id="tree"></div>

<script>

// INIT CHART (VERSI STABIL)
var chart = new OrgChart(document.getElementById("tree"), {
    template: "olivia", // pakai default dulu biar stabil
    enableSearch: true,
    nodeMouseClick: OrgChart.action.details,
    mouseScrool: OrgChart.action.zoom,

    nodeBinding: {
        field_0: "name",
        field_1: "title",
        img_0: "img"
    },

    nodes: [

        { id: 1, name: "Kepala Puskesmas", title: "dr. H. Yatino", img: "https://i.pravatar.cc/150?img=1" },

        { id: 10, pid: 1, name: "PJ Klaster 1 (Manajemen)", title: "Rian Prasetiyo", img: "https://i.pravatar.cc/150?img=2" },
        { id: 11, pid: 10, name: "Koordinator TU", title: "Cahyu Dana Safitri", img: "https://i.pravatar.cc/150?img=3" },
        { id: 12, pid: 10, name: "Koordinator SDM", title: "Siti Nurul Hidayah", img: "https://i.pravatar.cc/150?img=4" },

        { id: 20, pid: 1, name: "PJ Klaster 2 (Ibu & Anak)", title: "Retno Suciati", img: "https://i.pravatar.cc/150?img=5" },

        { id: 30, pid: 1, name: "PJ Klaster 3 (Dewasa & Lansia)", title: "dr. Mualimatul", img: "https://i.pravatar.cc/150?img=6" }

    ]
});

// UBAH WARNA POPUP (CARA AMAN)
chart.on('showDetails', function(){
    setTimeout(() => {

        // header
        document.querySelectorAll('.boc-header').forEach(el=>{
            el.style.background = '#2e7d32';
        });

        // tombol
        document.querySelectorAll('.boc-button').forEach(el=>{
            el.style.background = '#2e7d32';
        });

    }, 100);
});

</script>
</body>
</html>
