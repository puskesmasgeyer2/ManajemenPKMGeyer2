<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Struktur Organisasi Puskesmas Geyer 2</title>

<script src="https://balkan.app/js/OrgChart.js"></script>

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  background: #f1f8f4;
}

/* HEADER */
.header {
  text-align: center;
  margin-bottom: 15px;
}

.logo {
  width: 90px;
  margin-bottom: 8px;
}

h2 {
  color: #1b5e20;
  margin: 5px 0;
}

.subtitle {
  font-size: 14px;
  color: #2e7d32;
  font-weight: 500;
}

/* CONTAINER */
#tree {
  width: 100%;
  height: 750px;
  background: white;
  border-radius: 12px;
  border: 2px solid #c8e6c9;
  box-shadow: 0 3px 10px rgba(0,0,0,0.08);
}

/* ===== POPUP DETAIL (FIXED) ===== */

/* HEADER (bagian biru atas) */
.boc-card .boc-header,
.boc-header {
  background: #2e7d32 !important;
  color: white !important;
}

/* Avatar lingkaran */
.boc-card .boc-avatar,
.boc-avatar {
  border: 4px solid #2e7d32 !important;
}

/* Tombol bulat */
.boc-card .boc-button,
.boc-button {
  background: #2e7d32 !important;
  color: white !important;
}

/* Hover tombol */
.boc-button:hover {
  background: #1b5e20 !important;
}

/* Background isi */
.boc-card,
.boc-body {
  background: #f1f8f4 !important;
}

/* Label kecil (name/title/img) */
.boc-card .boc-label {
  color: #1b5e20 !important;
  font-weight: 600;
}

/* Value */
.boc-card .boc-value {
  color: #333 !important;
}

/* SHADOW biar lebih halus */
.boc-card {
  box-shadow: 0 6px 20px rgba(0,0,0,0.15) !important;
  border-radius: 12px !important;
}

/* ===== FIX PAKSA WARNA POPUP ===== */

/* Header biru → hijau */
div[style*="background-color: rgb(33, 150, 243)"] {
  background-color: #2e7d32 !important;
}

/* Tombol biru */
button, .boc-button, .boc-btn {
  background-color: #2e7d32 !important;
  color: white !important;
}

/* Hover */
button:hover {
  background-color: #1b5e20 !important;
}

/* Avatar border */
img[style*="border-radius"] {
  border: 4px solid #2e7d32 !important;
}
</style>
</head>

<body>

<div class="header">
  <img class="logo" src="logo.png">
  <h2>Struktur Organisasi Puskesmas Geyer 2</h2>
  <div class="subtitle">Berdasarkan SK Nomor: SK / 162 / I / 2024</div>
</div>

<div id="tree"></div>

<script>

// TEMPLATE CUSTOM
OrgChart.templates.green = Object.assign({}, OrgChart.templates.ana);

OrgChart.templates.green.size = [300, 110];

OrgChart.templates.green.node = `
  <rect x="0" y="0" width="300" height="110" rx="10" ry="10"
  fill="#2e7d32" stroke="#1b5e20" stroke-width="2"></rect>
`;

OrgChart.templates.green.img_0 = `
  <clipPath id="{randId}">
    <circle cx="45" cy="45" r="30"></circle>
  </clipPath>
  <image x="15" y="15" width="60" height="60" preserveAspectRatio="xMidYMid slice"
  clip-path="url(#{randId})" xlink:href="{val}"></image>
`;

OrgChart.templates.green.field_0 = `
  <foreignObject x="90" y="15" width="140" height="35">
    <div xmlns="http://www.w3.org/1999/xhtml"
      style="
        font-size:13px;
        color:white;
        font-weight:700;
        text-align:center;
        line-height:1.2;
        word-wrap:break-word;">
      {val}
    </div>
  </foreignObject>
`;

OrgChart.templates.green.field_1 = `
  <foreignObject x="90" y="55" width="140" height="30">
    <div xmlns="http://www.w3.org/1999/xhtml"
      style="
        font-size:12px;
        color:#e8f5e9;
        font-weight:600;
        text-align:center;
        line-height:1.2;
        word-wrap:break-word;">
      {val}
    </div>
  </foreignObject>
`;

// INIT CHART
var chart = new OrgChart(document.getElementById("tree"), {
    template: "green",
    enableSearch: true,
    nodeMouseClick: OrgChart.action.details,
    mouseScrool: OrgChart.action.zoom,

    nodeMenu: {
      details: { text: "Detail" }
    },

    nodeMenuButton: {
      icon: OrgChart.icon.menu(24, 24, '#ffffff')
    },

    nodeBinding: {
        field_0: "name",
        field_1: "title",
        img_0: "img"
    },

    nodes: [

        // KEPALA
        { id: 1, name: "Kepala Puskesmas", title: "dr. H. Yatino", img: "https://i.pravatar.cc/150?img=1" },

        // KLASTER 1
        { id: 10, pid: 1, name: "PJ Klaster 1 (Manajemen)", title: "Rian Prasetiyo", img: "https://i.pravatar.cc/150?img=2" },

        { id: 11, pid: 10, name: "Koordinator TU", title: "Cahyu Dana Safitri", img: "https://i.pravatar.cc/150?img=3" },
        { id: 12, pid: 10, name: "Koordinator SDM", title: "Siti Nurul Hidayah", img: "https://i.pravatar.cc/150?img=4" },
        { id: 13, pid: 10, name: "Koordinator Manajemen", title: "Muhammad Taufik Mubarok", img: "https://i.pravatar.cc/150?img=5" },
        { id: 14, pid: 10, name: "Koordinator Mutu & Keselamatan", title: "Happy Hartaning", img: "https://i.pravatar.cc/150?img=6" },
        { id: 15, pid: 10, name: "Koordinator Jejaring", title: "Sri Kusmini", img: "https://i.pravatar.cc/150?img=7" },
        { id: 16, pid: 10, name: "Koordinator Sistem Informasi", title: "Winarni", img: "https://i.pravatar.cc/150?img=8" },

        // KLASTER 2
        { id: 20, pid: 1, name: "PJ Klaster 2 (Ibu & Anak)", title: "Retno Suciati", img: "https://i.pravatar.cc/150?img=9" },

        { id: 21, pid: 20, name: "Koordinator Ibu Hamil", title: "Ririn Widiyanti", img: "https://i.pravatar.cc/150?img=10" },
        { id: 22, pid: 20, name: "Koordinator Balita", title: "Denny Ratna", img: "https://i.pravatar.cc/150?img=11" },
        { id: 23, pid: 20, name: "Koordinator Remaja", title: "Ike Sukasih", img: "https://i.pravatar.cc/150?img=12" },

        // KLASTER 3
        { id: 30, pid: 1, name: "PJ Klaster 3 (Dewasa & Lansia)", title: "dr. Mualimatul", img: "https://i.pravatar.cc/150?img=13" },

        { id: 31, pid: 30, name: "Koordinator Dewasa", title: "Ayu Dwi Sefterina", img: "https://i.pravatar.cc/150?img=14" },
        { id: 32, pid: 30, name: "Koordinator Lansia", title: "Apit Widyastuti", img: "https://i.pravatar.cc/150?img=15" },

        // KLASTER 4
        { id: 40, pid: 1, name: "PJ Klaster 4 (Penyakit Menular)", title: "Ns. Bekti Prasetyo", img: "https://i.pravatar.cc/150?img=16" },

        { id: 41, pid: 40, name: "Koordinator Kesling", title: "Danik Fachrudin", img: "https://i.pravatar.cc/150?img=17" },
        { id: 42, pid: 40, name: "Koordinator Surveilans", title: "Dimas Agus", img: "https://i.pravatar.cc/150?img=18" },

        // KLASTER 5
        { id: 50, pid: 1, name: "PJ Klaster 5 (Lintas Klaster)", title: "dr. Jenny Prima", img: "https://i.pravatar.cc/150?img=19" },

        { id: 51, pid: 50, name: "Koordinator Gawat Darurat", title: "Dimas Agus", img: "https://i.pravatar.cc/150?img=20" },
        { id: 52, pid: 50, name: "Koordinator Lab", title: "Ginuk Ari", img: "https://i.pravatar.cc/150?img=21" },
        { id: 53, pid: 50, name: "Koordinator Farmasi", title: "Sofa Rohmaniyah", img: "https://i.pravatar.cc/150?img=22" }


    ]
});

chart.on('showDetails', function(sender, args){
    setTimeout(() => {
        const headers = document.querySelectorAll('.boc-header');
        headers.forEach(h => {
            h.style.background = '#2e7d32';
        });
    }, 100);
});
</script>

</body>
</html>
