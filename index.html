<!DOCTYPE html>

<style>
body {

  background: #f1f8f4;
}

/* HEADER */
.header {
  text-align: center;
  margin-bottom: 15px;
}

.logo {
  width: 90px;
  margin-bottom: 8px;
}

h2 {
  color: #1b5e20;
  margin: 5px 0;
}

.subtitle {
  font-size: 14px;
  color: #2e7d32;
  font-weight: 500;
}

/* CONTAINER */
#tree {
  width: 100%;
  height: 750px;
  background: white;
  border-radius: 12px;
  border: 2px solid #c8e6c9;
  box-shadow: 0 3px 10px rgba(0,0,0,0.08);
}

</style>

<body>

  <h2>Struktur Organisasi Puskesmas Geyer 2</h2>
  <div class="subtitle">Berdasarkan SK Nomor: SK / 162 / I / 2024</div>
</div>

<div id="tree"></div>

<script>

// TEMPLATE CUSTOM
OrgChart.templates.green = Object.assign({}, OrgChart.templates.ana);

OrgChart.templates.green.size = [250, 90];

OrgChart.templates.green.node = `
  <rect x="0" y="0" width="250" height="90" rx="10" ry="10"
  fill="#2e7d32" stroke="#1b5e20" stroke-width="2"></rect>
`;

OrgChart.templates.green.img_0 = `
  <clipPath id="{randId}">
    <circle cx="45" cy="45" r="30"></circle>
  </clipPath>
  <image x="15" y="15" width="60" height="60" preserveAspectRatio="xMidYMid slice"
  clip-path="url(#{randId})" xlink:href="{val}"></image>
`;

OrgChart.templates.green.field_0 = `
  <text x="130" y="35" text-anchor="middle"
  style="font-size:14px;fill:#ffffff;font-weight:bold;">
  {val}
  </text>
`;

OrgChart.templates.green.field_1 = `
  <text x="130" y="60" text-anchor="middle"
  style="font-size:12px;fill:#e8f5e9;">
  {val}
  </text>
`;

// INIT CHART
var chart = new OrgChart(document.getElementById("tree"), {
    template: "green",

    mouseScrool: OrgChart.action.zoom,
    nodeBinding: {
