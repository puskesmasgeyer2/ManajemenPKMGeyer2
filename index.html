}

  color: #2e7d32;
  font-weight: 500;

}

#tree {

    <button onclick="closePopup()" style="

      border:none;
      border-radius:6px;

chart.on('nodeClick', function(sender, args){
    const data = args.node.data;

    document.getElementById("popupImg").src = data.img || "logo.png";

    document.getElementById("popupName").innerText = data.name || "-";
    document.getElementById("popupTitle").innerText = data.title || "-";

    document.getElementById("popupNama").innerText = data.name || "-";
    document.getElementById("popupPangkat").innerText = data.pangkat || "-";
    document.getElementById("popupJabatan").innerText = data.jabatan || "-";
    document.getElementById("popupStatus").innerText = data.status || "-";
    document.getElementById("popupTugas").innerText = data.tugas || "-";

    document.getElementById("popup").style.display = "block";
});

function closePopup(){
    document.getElementById("popup").style.display = "none";
}

  document.getElementById("popup").addEventListener("click", function(e){
    if(e.target.id === "popup"){
        closePopup();
    }
});
</script>
