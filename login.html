<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login Dashboard</title>

<style>

body{
  font-family:Arial;
  background:#f4f7f6;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.box{
  background:white;
  padding:30px;
  border-radius:20px;
  width:320px;
  box-shadow:0 4px 20px rgba(0,0,0,0.1);
}

input{
  width:100%;
  padding:12px;
  margin-bottom:15px;
  border-radius:10px;
  border:1px solid #ccc;
  box-sizing:border-box;
}

button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:14px;
  background:#0f9d58;
  color:white;
  font-size:16px;
  font-weight:600;
  cursor:pointer;
  transition:0.3s;
  display:flex;
  justify-content:center;
  align-items:center;
  gap:10px;
}

button:hover{
  background:#0c8249;
}

button:disabled{
  opacity:0.7;
  cursor:not-allowed;
}

.msg{
  margin-top:10px;
  color:red;
  text-align:center;
}

.spinner{
  width:18px;
  height:18px;
  border:3px solid rgba(255,255,255,0.3);
  border-top:3px solid white;
  border-radius:50%;
  animation:spin 0.8s linear infinite;
}

@keyframes spin{
  100%{
    transform:rotate(360deg);
  }
}

#loadingIcon{
  display:flex;
  align-items:center;
}

</style>
</head>
<body>

<div class="box">

<h2>Login Dashboard</h2>

<input
  type="text"
  id="nip"
  placeholder="NIP"
/>

<input
  type="password"
  id="password"
  placeholder="Password"
/>

<button
  onclick="login()"
  id="loginBtn"
>

<span id="btnText">
Login
</span>

<div
  id="loadingIcon"
  style="display:none;"
>
<div class="spinner"></div>
</div>

</button>

<div class="msg" id="msg"></div>

</div>

<script>

const API =
'https://script.google.com/macros/s/AKfycbyXOBBho6NOX6QRksfs6JRfm04kbB2553fPueh-WdpseZH5YtJ5bL-Mmbgvw6LUaAlUYA/exec';

async function login(){

  const btn =
  document.getElementById('loginBtn');

  const btnText =
  document.getElementById('btnText');

  const loading =
  document.getElementById('loadingIcon');

  // ======================
  // AMBIL INPUT
  // ======================

  const nip =
  document.getElementById('nip').value.trim();

  const password =
  document.getElementById('password').value.trim();

  // ======================
  // VALIDASI
  // ======================

  if(!nip || !password){

    document.getElementById('msg')
    .innerText =
    'NIP dan Password wajib diisi';

    return;

  }

  // ======================
  // LOCK BUTTON
  // ======================

  btn.disabled = true;

  btnText.innerText =
  'Memproses...';

  loading.style.display =
  'inline-block';

  document.getElementById('msg')
  .innerText = '';

  try{

    const res = await fetch(
      `${API}?api=login&nip=${nip}&password=${password}`
    );

    const data = await res.json();

    // ======================
    // LOGIN BERHASIL
    // ======================

    if(data.success){

      btnText.innerText =
      'Berhasil Login';

      localStorage.setItem(
        'token',
        data.token
      );

      localStorage.setItem(
        'role',
        data.role
      );

      setTimeout(()=>{

        window.location.href =
        'dashboard.html';

      }, 800);

    }

    // ======================
    // LOGIN GAGAL
    // ======================

    else{

      document.getElementById('msg')
      .innerText =
      data.message;

      btn.disabled = false;

      btnText.innerText =
      'Login';

      loading.style.display =
      'none';

    }

  }

  catch(err){

    document.getElementById('msg')
    .innerText =
    'Koneksi gagal';

    btn.disabled = false;

    btnText.innerText =
    'Login';

    loading.style.display =
    'none';

  }

}

</script>

</body>
</html>
